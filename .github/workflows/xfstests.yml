name: xfstests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  xfstests:
    name: Run xfstests FUSE Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Disk space cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y acl attr automake bc dbench dump e2fsprogs fio gawk \
            gcc git indent libacl1-dev libaio-dev libcap-dev libgdbm-dev libtool \
            libtool-bin liburing-dev libuuid1 lvm2 make psmisc python3 quota sed \
            uuid-dev uuid-runtime xfsprogs sqlite3 \
            libgdbm-compat-dev fuse3
          sudo apt-get install -y exfatprogs f2fs-tools ocfs2-tools udftools xfsdump \
            xfslibs-dev || true
          sudo apt-get install -y systemd-coredump systemd jq pkg-config

      - name: Clone and build xfstests
        run: |
          git clone https://git.kernel.org/pub/scm/fs/xfs/xfstests-dev.git /tmp/xfstests
          bash scripts/patch_xfstests_for_clawfs.sh /tmp/xfstests
          cd /tmp/xfstests
          make
          sudo make install

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ClawFS daemon
        run: |
          cargo build --release --bin clawfsd

      - name: Create data directories
        run: |
          mkdir -p /tmp/clawfs-test-store /tmp/clawfs-scratch-store
          mkdir -p /tmp/clawfs-test-cache /tmp/clawfs-scratch-cache

      - name: Install FUSE mount helper
        run: |
          sudo env CLAWFSD_BIN="$GITHUB_WORKSPACE/target/release/clawfsd" \
            MOUNT_HELPER_PATH=/sbin/mount.fuse \
            bash scripts/install_xfstests_mount_helper.sh
          sudo env CLAWFSD_BIN="$GITHUB_WORKSPACE/target/release/clawfsd" \
            bash scripts/install_xfstests_mount_helper.sh

      - name: Create mount points
        run: |
          sudo mkdir -p /mnt/test /mnt/scratch

      - name: Configure xfstests
        working-directory: /tmp/xfstests
        run: |
          cat > local.config << 'EOF'
          repair_fuse_mountpoint() {
            local path="$1"
            mkdir -p "$(dirname "$path")"
            if mountpoint -q "$path" && ! ls "$path" >/dev/null 2>&1; then
              echo "repair_fuse_mountpoint: clearing stale mount at $path" >> /tmp/xfstests-debug/local-config.log
              fusermount3 -u "$path" >/dev/null 2>&1 || umount -l "$path" >/dev/null 2>&1 || true
              if mountpoint -q "$path"; then
                echo "repair_fuse_mountpoint: stale mount persists at $path" >> /tmp/xfstests-debug/local-config.log
                return 0
              fi
            fi
            mkdir -p "$path"
          }

          mkdir -p /tmp/xfstests-debug
          repair_fuse_mountpoint /mnt/test
          repair_fuse_mountpoint /mnt/scratch

          export FSTYP=fuse
          export MOUNT_PROG=/tmp/xfstests-debug/mount-wrapper
          export UMOUNT_PROG=/tmp/xfstests-debug/umount-wrapper
          export CLAWFS_XFSTESTS_DEBUG_LOG=/tmp/xfstests-debug/helper.log

          export TEST_DEV=/mnt/test
          export TEST_DIR=/mnt/test
          export SCRATCH_DEV=/mnt/scratch
          export SCRATCH_MNT=/mnt/scratch

          export TEST_FS_MOUNT_OPTS="-o source=/tmp/clawfs-test-store,allow_other,default_permissions,local_cache_path=/tmp/clawfs-test-cache,state_path=/tmp/clawfs-test-state.bin,fuse_fsname=/mnt/test"
          export MOUNT_OPTIONS="-o source=/tmp/clawfs-scratch-store,allow_other,default_permissions,local_cache_path=/tmp/clawfs-scratch-cache,state_path=/tmp/clawfs-scratch-state.bin,fuse_fsname=/mnt/scratch"
          EOF

          cat > excludes << 'EOF'
          generic/003
          generic/013
          generic/035
          generic/069
          generic/075
          generic/091
          generic/112
          generic/113
          generic/126
          generic/169
          generic/184
          generic/394
          generic/467
          generic/263
          generic/759
          generic/760
          generic/477
          generic/564
          generic/633
          generic/696
          generic/591
          generic/615
          generic/087
          EOF

      - name: Debug mount environment
        run: |
          mkdir -p /tmp/xfstests-debug
          cat > /tmp/xfstests-debug/mount-wrapper << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          log=/tmp/xfstests-debug/mount-calls.log
          {
            printf '[%s] mount-wrapper pid=%s\n' "$(date -Is)" "$$"
            printf 'argv='
            printf '%q ' /usr/bin/mount "$@"
            printf '\n'
            echo "env_FSTYP=${FSTYP-}"
            echo "env_FUSE_SUBTYP=${FUSE_SUBTYP-}"
            echo "env_MOUNT_OPTIONS=${MOUNT_OPTIONS-}"
            echo "env_TEST_FS_MOUNT_OPTS=${TEST_FS_MOUNT_OPTS-}"
          } >>"$log"
          if /usr/bin/mount "$@" >>"$log" 2>&1; then
            status=0
          else
            status=$?
          fi
          {
            echo "status=$status"
            echo "proc_mounts:"
            grep '/mnt/test\|/mnt/scratch' /proc/mounts || true
            echo
          } >>"$log"
          exit "$status"
          EOF
          chmod +x /tmp/xfstests-debug/mount-wrapper
          cat > /tmp/xfstests-debug/umount-wrapper << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          log=/tmp/xfstests-debug/umount-calls.log
          {
            printf '[%s] umount-wrapper pid=%s\n' "$(date -Is)" "$$"
            printf 'argv='
            printf '%q ' /usr/bin/umount "$@"
            printf '\n'
          } >>"$log"
          if /usr/bin/umount "$@" >>"$log" 2>&1; then
            status=0
          else
            status=$?
          fi
          {
            echo "status=$status"
            echo "proc_mounts:"
            grep '/mnt/test\|/mnt/scratch' /proc/mounts || true
            echo
          } >>"$log"
          exit "$status"
          EOF
          chmod +x /tmp/xfstests-debug/umount-wrapper
          {
            echo "== uname -a =="
            uname -a
            echo
            echo "== /etc/os-release =="
            cat /etc/os-release
            echo
            echo "== mount path =="
            command -v mount
            readlink -f "$(command -v mount)"
            echo
            echo "== mount --version =="
            mount --version || true
            echo
            echo "== findmnt --version =="
            findmnt --version || true
            echo
            echo "== package versions =="
            dpkg-query -W mount util-linux libmount1 || true
            echo
            echo "== apt policy =="
            apt-cache policy mount util-linux libmount1 || true
            echo
            echo "== helper scripts =="
            ls -l /sbin/mount.fuse /sbin/mount.fuse.clawfs || true
            echo
            echo "== /sbin/mount.fuse =="
            sed -n '1,120p' /sbin/mount.fuse || true
            echo
            echo "== /sbin/mount.fuse.clawfs =="
            sed -n '1,120p' /sbin/mount.fuse.clawfs || true
            echo
            echo "== /tmp/xfstests-debug/mount-wrapper =="
            sed -n '1,160p' /tmp/xfstests-debug/mount-wrapper || true
            echo
            echo "== /tmp/xfstests-debug/umount-wrapper =="
            sed -n '1,160p' /tmp/xfstests-debug/umount-wrapper || true
          } | tee /tmp/xfstests-debug/env.txt

      - name: Run xfstests smoke
        working-directory: /tmp/xfstests
        run: |
          sudo ./check -E excludes generic/001 generic/011 generic/023 generic/024 generic/028 generic/029 generic/030 generic/080 generic/084 generic/087 generic/088 generic/095 generic/098

      - name: Debug mount results
        if: always()
        run: |
          mkdir -p /tmp/xfstests-debug
          {
            echo "== local-config.log =="
            cat /tmp/xfstests-debug/local-config.log || true
            echo
            echo "== mount-calls.log =="
            cat /tmp/xfstests-debug/mount-calls.log || true
            echo
            echo "== umount-calls.log =="
            cat /tmp/xfstests-debug/umount-calls.log || true
            echo
            echo "== helper.log =="
            cat /tmp/xfstests-debug/helper.log || true
            echo
            echo "== findmnt test =="
            findmnt -T /mnt/test -o SOURCE,FSTYPE,TARGET,OPTIONS || true
            echo
            echo "== findmnt scratch =="
            findmnt -T /mnt/scratch -o SOURCE,FSTYPE,TARGET,OPTIONS || true
            echo
            echo "== df -T =="
            df -T /mnt/test /mnt/scratch || true
            echo
            echo "== /proc/self/mountinfo =="
            grep '/mnt/test\|/mnt/scratch' /proc/self/mountinfo || true
            echo
            echo "== /proc/mounts =="
            grep '/mnt/test\|/mnt/scratch' /proc/mounts || true
          } | tee /tmp/xfstests-debug/mount-state.txt

      - name: Upload xfstests results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xfstests-results
          path: |
            /tmp/xfstests/results/
            /tmp/xfstests-debug/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          cd /tmp
          sudo fusermount3 -u /mnt/test || sudo umount /mnt/test || true
          sudo fusermount3 -u /mnt/scratch || sudo umount /mnt/scratch || true
          pkill -f "target/release/clawfsd --mount-path /mnt/test" || true
          pkill -f "target/release/clawfsd --mount-path /mnt/scratch" || true
