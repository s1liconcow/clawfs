name: xfstests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  xfstests:
    name: Run xfstests NFS Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Disk space cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y acl attr automake bc dbench dump e2fsprogs fio gawk \
            gcc git indent libacl1-dev libaio-dev libcap-dev libgdbm-dev libtool \
            libtool-bin liburing-dev libuuid1 lvm2 make psmisc python3 quota sed \
            uuid-dev uuid-runtime xfsprogs sqlite3 \
            libgdbm-compat-dev nfs-common
          sudo apt-get install -y exfatprogs f2fs-tools ocfs2-tools udftools xfsdump \
            xfslibs-dev || true
          sudo apt-get install -y systemd-coredump systemd jq pkg-config

      - name: Clone and build xfstests
        run: |
          git clone https://git.kernel.org/pub/scm/fs/xfs/xfstests-dev.git /tmp/xfstests
          cd /tmp/xfstests
          make
          sudo make install

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ClawFS NFS gateway
        run: |
          cd clawfs-nfs-gateway
          cargo build --release

      - name: Create data directories
        run: |
          mkdir -p /tmp/clawfs-test-store /tmp/clawfs-scratch-store
          mkdir -p /tmp/clawfs-test-cache /tmp/clawfs-scratch-cache

      - name: Start ClawFS NFS gateway (TEST instance)
        run: |
          clawfs-nfs-gateway/target/release/clawfs-nfs-gateway \
            --store-path /tmp/clawfs-test-store \
            --local-cache-path /tmp/clawfs-test-cache \
            --state-path /tmp/clawfs-test-state.bin \
            --object-provider local \
            --disable-journal \
            --listen 127.0.0.1:2049 &
          echo $! > /tmp/clawfs-test.pid

          echo "Waiting for TEST instance..."
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 2049; then
              echo "TEST instance is ready"
              break
            fi
            sleep 1
          done

          if ! nc -z 127.0.0.1 2049; then
            echo "TEST instance failed to start"
            exit 1
          fi

      - name: Start ClawFS NFS gateway (SCRATCH instance)
        run: |
          clawfs-nfs-gateway/target/release/clawfs-nfs-gateway \
            --store-path /tmp/clawfs-scratch-store \
            --local-cache-path /tmp/clawfs-scratch-cache \
            --state-path /tmp/clawfs-scratch-state.bin \
            --object-provider local \
            --disable-journal \
            --listen 127.0.0.1:20499 &
          echo $! > /tmp/clawfs-scratch.pid

          echo "Waiting for SCRATCH instance..."
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 20499; then
              echo "SCRATCH instance is ready"
              break
            fi
            sleep 1
          done

          if ! nc -z 127.0.0.1 20499; then
            echo "SCRATCH instance failed to start"
            exit 1
          fi

      - name: Create mount points
        run: |
          sudo mkdir -p /mnt/test /mnt/scratch

      - name: Configure xfstests
        working-directory: /tmp/xfstests
        run: |
          cat > local.config << 'EOF'
          export FSTYP=nfs

          export TEST_DEV=localhost:/
          export TEST_DIR=/mnt/test
          export SCRATCH_DEV=127.0.0.1:/
          export SCRATCH_MNT=/mnt/scratch

          export TEST_FS_MOUNT_OPTS="-o nolock,tcp,port=2049,mountport=2049,vers=3,hard"
          export NFS_MOUNT_OPTIONS="-o nolock,tcp,port=20499,mountport=20499,vers=3,hard"
          EOF

          cat > excludes << 'EOF'
          generic/003
          generic/013
          generic/035
          generic/069
          generic/075
          generic/091
          generic/112
          generic/113
          generic/126
          generic/169
          generic/184
          generic/394
          generic/467
          generic/263
          generic/759
          generic/760
          generic/477
          generic/564
          generic/633
          generic/696
          generic/591
          generic/615
          generic/087
          EOF

      - name: Run xfstests smoke
        working-directory: /tmp/xfstests
        run: |
          sudo ./check -E excludes generic/001 generic/011 generic/023 generic/024 generic/028 generic/029 generic/030 generic/080 generic/084 generic/087 generic/088 generic/095 generic/098

      - name: Upload xfstests results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xfstests-results
          path: /tmp/xfstests/results/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          cd /tmp
          sudo umount /mnt/test || true
          sudo umount /mnt/scratch || true

          if [ -f /tmp/clawfs-test.pid ]; then
            kill $(cat /tmp/clawfs-test.pid) || true
          fi
          if [ -f /tmp/clawfs-scratch.pid ]; then
            kill $(cat /tmp/clawfs-scratch.pid) || true
          fi
          pkill -f clawfs-nfs-gateway || true
