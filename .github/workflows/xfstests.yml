name: xfstests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  xfstests:
    name: Run xfstests FUSE Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Disk space cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y acl attr automake bc dbench dump e2fsprogs fio gawk \
            gcc git indent libacl1-dev libaio-dev libcap-dev libgdbm-dev libtool \
            libtool-bin liburing-dev libuuid1 lvm2 make psmisc python3 quota sed \
            uuid-dev uuid-runtime xfsprogs linux-headers-$(uname -r) sqlite3 \
            libgdbm-compat-dev fuse3
          sudo apt-get install -y exfatprogs f2fs-tools ocfs2-tools udftools xfsdump \
            xfslibs-dev || true
          sudo apt-get install -y systemd-coredump systemd jq pkg-config

          echo "user_allow_other" | sudo tee -a /etc/fuse.conf

      - name: Clone and build xfstests
        run: |
          git clone https://git.kernel.org/pub/scm/fs/xfs/xfstests-dev.git /tmp/xfstests
          cd /tmp/xfstests
          make
          sudo make install

      - uses: dtolnay/rust-toolchain@stable

      - name: Build OsageFS
        run: cargo build --release

      - name: Start OsageFS (TEST instance)
        run: |
          mkdir -p /tmp/osagefs-test-mnt /tmp/osagefs-test-store /tmp/osagefs-test-cache

          ./target/release/osagefs \
            --mount-path /tmp/osagefs-test-mnt \
            --store-path /tmp/osagefs-test-store \
            --local-cache-path /tmp/osagefs-test-cache \
            --state-path /tmp/osagefs-test-state.bin \
            --object-provider local \
            --allow-other \
            --disable-journal \
            --disable-cleanup \
            --foreground &
          echo $! > /tmp/osagefs-test.pid

          echo "Waiting for OsageFS TEST mount..."
          for i in $(seq 1 30); do
            if mountpoint -q /tmp/osagefs-test-mnt 2>/dev/null; then
              echo "OsageFS TEST is mounted"
              break
            fi
            sleep 1
          done

          if ! mountpoint -q /tmp/osagefs-test-mnt 2>/dev/null; then
            echo "OsageFS TEST failed to mount"
            exit 1
          fi

      - name: Start OsageFS (SCRATCH instance)
        run: |
          mkdir -p /tmp/osagefs-scratch-mnt /tmp/osagefs-scratch-store /tmp/osagefs-scratch-cache

          ./target/release/osagefs \
            --mount-path /tmp/osagefs-scratch-mnt \
            --store-path /tmp/osagefs-scratch-store \
            --local-cache-path /tmp/osagefs-scratch-cache \
            --state-path /tmp/osagefs-scratch-state.bin \
            --object-provider local \
            --allow-other \
            --disable-journal \
            --disable-cleanup \
            --foreground &
          echo $! > /tmp/osagefs-scratch.pid

          echo "Waiting for OsageFS SCRATCH mount..."
          for i in $(seq 1 30); do
            if mountpoint -q /tmp/osagefs-scratch-mnt 2>/dev/null; then
              echo "OsageFS SCRATCH is mounted"
              break
            fi
            sleep 1
          done

          if ! mountpoint -q /tmp/osagefs-scratch-mnt 2>/dev/null; then
            echo "OsageFS SCRATCH failed to mount"
            exit 1
          fi

      - name: Configure xfstests
        working-directory: /tmp/xfstests
        run: |
          cat > local.config << 'EOF'
          export FSTYP=fuse
          export FUSE_SUBTYPE=osagefs

          export TEST_DIR=/tmp/osagefs-test-mnt
          export SCRATCH_MNT=/tmp/osagefs-scratch-mnt

          # xfstests requires these even for FUSE; point to dummy values
          export TEST_DEV=/tmp/osagefs-test-store
          export SCRATCH_DEV=/tmp/osagefs-scratch-store
          EOF

          cat > excludes << 'EOF'
          generic/035
          generic/126
          generic/394
          generic/467
          generic/263
          generic/759
          generic/760
          generic/477
          generic/564
          generic/633
          generic/696
          generic/591
          generic/615
          EOF

      - name: Run xfstests
        working-directory: /tmp/xfstests
        run: |
          sudo ./check -g quick -E excludes || true

      - name: Upload xfstests results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xfstests-results
          path: /tmp/xfstests/results/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          cd /tmp
          if [ -f /tmp/osagefs-test.pid ]; then
            kill $(cat /tmp/osagefs-test.pid) || true
          fi
          if [ -f /tmp/osagefs-scratch.pid ]; then
            kill $(cat /tmp/osagefs-scratch.pid) || true
          fi
          sleep 2
          sudo umount -l /tmp/osagefs-test-mnt || fusermount -u /tmp/osagefs-test-mnt || true
          sudo umount -l /tmp/osagefs-scratch-mnt || fusermount -u /tmp/osagefs-scratch-mnt || true
