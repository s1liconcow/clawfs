name: xfstests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  xfstests:
    name: Run xfstests FUSE Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Disk space cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y acl attr automake bc dbench dump e2fsprogs fio gawk \
            gcc git indent libacl1-dev libaio-dev libcap-dev libgdbm-dev libtool \
            libtool-bin liburing-dev libuuid1 lvm2 make psmisc python3 quota sed \
            uuid-dev uuid-runtime xfsprogs sqlite3 \
            libgdbm-compat-dev fuse3
          sudo apt-get install -y exfatprogs f2fs-tools ocfs2-tools udftools xfsdump \
            xfslibs-dev || true
          sudo apt-get install -y systemd-coredump systemd jq pkg-config

          echo "user_allow_other" | sudo tee -a /etc/fuse.conf

      - name: Clone and build xfstests
        run: |
          git clone https://git.kernel.org/pub/scm/fs/xfs/xfstests-dev.git /tmp/xfstests
          cd /tmp/xfstests
          make
          sudo make install

      - uses: dtolnay/rust-toolchain@stable

      - name: Build OsageFS
        run: cargo build --release

      - name: Install xfstests FUSE mount helper
        run: |
          sudo tee /sbin/mount.fuse.osagefs > /dev/null << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          src=""
          mnt=""
          optstr=""
          args=("$@")
          i=0
          while ((i < ${#args[@]})); do
            arg="${args[$i]}"
            case "$arg" in
              -o)
                ((i+=1))
                optstr="${args[$i]:-}"
                ;;
              -o*)
                optstr="${arg#-o}"
                ;;
              -t|-O|-U)
                # consume option value
                ((i+=1))
                ;;
              -r|-w|-f|-n|-v|-s|-i|-l)
                # handled/ignored mount(8) flags
                ;;
              -*)
                # ignore unknown flags
                ;;
              *)
                if [[ -z "$src" ]]; then
                  src="$arg"
                elif [[ -z "$mnt" ]]; then
                  mnt="$arg"
                fi
                ;;
            esac
            ((i+=1))
          done

          while (($#)); do
            case "$1" in
              -o) shift; optstr="${1:-}" ;;
              -o*) optstr="${1#-o}" ;;
            esac
            shift || true
          done

          store=""
          IFS="," read -ra kvs <<< "$optstr"
          for kv in "${kvs[@]}"; do
            case "$kv" in
              source=*) store="${kv#source=}" ;;
              store=*) store="${kv#store=}" ;;
            esac
          done
          if [[ -z "$store" || -z "$src" || -z "$mnt" ]]; then
            echo "mount.fuse.osagefs: bad args src=$src mnt=$mnt opts=$optstr argv=$*" >&2
            exit 1
          fi
          if mountpoint -q "$mnt"; then
            exit 0
          fi
          name="$(basename "$mnt" | tr -cs 'a-zA-Z0-9' '_')"
          cache="/tmp/osagefs-${name}-cache"
          state="/tmp/osagefs-${name}-state.bin"
          mkdir -p "$store" "$cache" "$mnt"
          nohup /home/runner/work/osagefs/osagefs/target/release/osagefs \
            --mount-path "$mnt" \
            --store-path "$store" \
            --local-cache-path "$cache" \
            --state-path "$state" \
            --object-provider local \
            --fuse-fsname "$src" \
            --allow-other \
            --disable-journal \
            --disable-cleanup \
            --foreground >/dev/null 2>&1 &
          for _ in $(seq 1 40); do
            mountpoint -q "$mnt" && exit 0
            sleep 1
          done
          exit 1
          EOF
          sudo chmod +x /sbin/mount.fuse.osagefs

      - name: Configure xfstests
        working-directory: /tmp/xfstests
        run: |
          cat > local.config << 'EOF'
          export FSTYP=fuse
          export FUSE_SUBTYP=.osagefs

          export TEST_DEV=osagefs_test
          export TEST_DIR=/tmp/osagefs-test-mnt
          export SCRATCH_DEV=osagefs_scratch
          export SCRATCH_MNT=/tmp/osagefs-scratch-mnt

          export TEST_FS_MOUNT_OPTS="source=/tmp/osagefs-test-store,allow_other,default_permissions"
          export MOUNT_OPTIONS="source=/tmp/osagefs-scratch-store,allow_other,default_permissions"
          EOF

          cat > excludes << 'EOF'
          generic/003
          generic/013
          generic/035
          generic/069
          generic/075
          generic/091
          generic/112
          generic/113
          generic/126
          generic/169
          generic/184
          generic/394
          generic/467
          generic/263
          generic/759
          generic/760
          generic/477
          generic/564
          generic/633
          generic/696
          generic/591
          generic/615
          EOF

      - name: Run xfstests smoke
        working-directory: /tmp/xfstests
        run: |
          sudo mkdir -p /tmp/osagefs-test-mnt /tmp/osagefs-scratch-mnt /tmp/osagefs-test-store /tmp/osagefs-scratch-store
          sudo ./check -E excludes generic/001 generic/011 generic/023 generic/024 generic/028 generic/029 generic/030 generic/080 generic/084 generic/087 generic/088 generic/095 generic/098

      - name: Upload xfstests results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xfstests-results
          path: /tmp/xfstests/results/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          cd /tmp
          sudo pkill -f "/home/runner/work/osagefs/osagefs/target/release/osagefs --mount-path /tmp/osagefs-test-mnt" || true
          sudo pkill -f "/home/runner/work/osagefs/osagefs/target/release/osagefs --mount-path /tmp/osagefs-scratch-mnt" || true
          sleep 2
          sudo umount -l /tmp/osagefs-test-mnt || fusermount -u /tmp/osagefs-test-mnt || true
          sudo umount -l /tmp/osagefs-scratch-mnt || fusermount -u /tmp/osagefs-scratch-mnt || true
