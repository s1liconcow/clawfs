name: xfstests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  xfstests:
    name: Run xfstests FUSE Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Disk space cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y acl attr automake bc dbench dump e2fsprogs fio gawk \
            gcc git indent libacl1-dev libaio-dev libcap-dev libgdbm-dev libtool \
            libtool-bin liburing-dev libuuid1 lvm2 make psmisc python3 quota sed \
            uuid-dev uuid-runtime xfsprogs sqlite3 \
            libgdbm-compat-dev fuse3
          sudo apt-get install -y exfatprogs f2fs-tools ocfs2-tools udftools xfsdump \
            xfslibs-dev || true
          sudo apt-get install -y systemd-coredump systemd jq pkg-config

      - name: Clone and build xfstests
        run: |
          git clone https://git.kernel.org/pub/scm/fs/xfs/xfstests-dev.git /tmp/xfstests
          cd /tmp/xfstests
          make
          sudo make install

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ClawFS daemon
        run: |
          cargo build --release --bin clawfsd

      - name: Create data directories
        run: |
          mkdir -p /tmp/clawfs-test-store /tmp/clawfs-scratch-store
          mkdir -p /tmp/clawfs-test-cache /tmp/clawfs-scratch-cache

      - name: Install FUSE mount helper
        run: |
          sudo tee /sbin/mount.fuse.clawfs >/dev/null <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          LOGFILE="/tmp/mount.fuse.clawfs.log"
          echo "$(date -u +%T) mount.fuse.clawfs called: $*" >> "$LOGFILE"

          source_dev=""
          target=""
          mount_opts=""

          while (($#)); do
            case "$1" in
              -o)
                mount_opts="${2:-}"
                shift 2
                ;;
              -*)
                shift
                ;;
              *)
                if [[ -z "$source_dev" ]]; then
                  source_dev="$1"
                elif [[ -z "$target" ]]; then
                  target="$1"
                fi
                shift
                ;;
            esac
          done

          if [[ -z "$source_dev" || -z "$target" ]]; then
            echo "mount.fuse.clawfs requires source and target" >&2
            exit 1
          fi

          store_path="$source_dev"
          local_cache_path="${target%/}.cache"
          state_path="${target%/}.state.bin"
          fuse_fsname="clawfs"
          allow_other=0

          IFS=',' read -r -a opt_array <<< "$mount_opts"
          for opt in "${opt_array[@]}"; do
            case "$opt" in
              source=*) store_path="${opt#source=}" ;;
              local_cache_path=*) local_cache_path="${opt#local_cache_path=}" ;;
              state_path=*) state_path="${opt#state_path=}" ;;
              fuse_fsname=*) fuse_fsname="${opt#fuse_fsname=}" ;;
              allow_other) allow_other=1 ;;
            esac
          done

          # Unmount any existing mount at target to support remount cycles
          if mountpoint -q "$target" 2>/dev/null; then
            echo "$(date -u +%T) pre-unmounting $target" >> "$LOGFILE"
            fusermount3 -u "$target" 2>/dev/null || umount "$target" 2>/dev/null || true
            # Wait for old clawfsd to finish flush_pending() in its destroy() handler
            for _w in $(seq 1 100); do
              pgrep -f "clawfsd.*--mount-path $target" >/dev/null 2>&1 || break
              sleep 0.1
            done
          fi

          mkdir -p "$store_path" "$local_cache_path" "$(dirname "$state_path")" "$target"

          cmd=(
            "__CLAWFSD_BIN__"
            --mount-path "$target"
            --store-path "$store_path"
            --local-cache-path "$local_cache_path"
            --state-path "$state_path"
            --object-provider local
            --disable-journal
            --fuse-fsname "$fuse_fsname"
            --foreground
          )

          if [[ "$allow_other" == "1" ]]; then
            cmd+=(--allow-other)
          fi

          echo "$(date -u +%T) launching: ${cmd[*]}" >> "$LOGFILE"

          # Run clawfsd in foreground mode but backgrounded; wait for mount to appear
          "${cmd[@]}" >>"$LOGFILE" 2>&1 &
          FUSE_PID=$!

          for i in $(seq 1 60); do
            if ! kill -0 "$FUSE_PID" 2>/dev/null; then
              echo "$(date -u +%T) clawfsd exited prematurely" >> "$LOGFILE"
              echo "mount.fuse.clawfs: clawfsd exited before mount appeared" >&2
              exit 1
            fi
            if mountpoint -q "$target" 2>/dev/null; then
              echo "$(date -u +%T) mount visible at $target after ${i}s" >> "$LOGFILE"
              exit 0
            fi
            sleep 0.5
          done

          echo "$(date -u +%T) timeout waiting for mount at $target" >> "$LOGFILE"
          kill "$FUSE_PID" 2>/dev/null || true
          echo "mount.fuse.clawfs: timeout waiting for mount at $target" >&2
          exit 1
          EOF
          sudo sed -i "s|__CLAWFSD_BIN__|$GITHUB_WORKSPACE/target/release/clawfsd|" /sbin/mount.fuse.clawfs
          sudo chmod +x /sbin/mount.fuse.clawfs
          echo user_allow_other | sudo tee -a /etc/fuse.conf >/dev/null

      - name: Create mount points
        run: |
          sudo mkdir -p /mnt/test /mnt/scratch

      - name: Configure xfstests
        working-directory: /tmp/xfstests
        run: |
          cat > local.config << 'EOF'
          export FSTYP=fuse
          export FUSE_SUBTYP=.clawfs

          export TEST_DEV=/mnt/test
          export TEST_DIR=/mnt/test
          export SCRATCH_DEV=/mnt/scratch
          export SCRATCH_MNT=/mnt/scratch

          export TEST_FS_MOUNT_OPTS="-o source=/tmp/clawfs-test-store,allow_other,default_permissions,local_cache_path=/tmp/clawfs-test-cache,state_path=/tmp/clawfs-test-state.bin,fuse_fsname=/mnt/test"
          export MOUNT_OPTIONS="-o source=/tmp/clawfs-scratch-store,allow_other,default_permissions,local_cache_path=/tmp/clawfs-scratch-cache,state_path=/tmp/clawfs-scratch-state.bin,fuse_fsname=/mnt/scratch"
          EOF

          cat > excludes << 'EOF'
          generic/003
          generic/013
          generic/035
          generic/069
          generic/075
          generic/091
          generic/112
          generic/113
          generic/126
          generic/169
          generic/184
          generic/394
          generic/467
          generic/263
          generic/759
          generic/760
          generic/477
          generic/564
          generic/633
          generic/696
          generic/591
          generic/615
          generic/087
          EOF

      - name: Run xfstests smoke
        working-directory: /tmp/xfstests
        run: |
          sudo ./check -E excludes generic/001 generic/011 generic/023 generic/024 generic/028 generic/029 generic/030 generic/080 generic/084 generic/087 generic/088 generic/095 generic/098

      - name: Upload xfstests results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xfstests-results
          path: |
            /tmp/xfstests/results/
            /tmp/mount.fuse.clawfs.log
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          cd /tmp
          sudo fusermount3 -u /mnt/test || sudo umount /mnt/test || true
          sudo fusermount3 -u /mnt/scratch || sudo umount /mnt/scratch || true
          pkill -f "target/release/clawfsd --mount-path /mnt/test" || true
          pkill -f "target/release/clawfsd --mount-path /mnt/scratch" || true
