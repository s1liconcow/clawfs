name: kernel-compile

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  kernel-compile:
    name: Compile Linux Kernel on FUSE mount
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Disk space cleanup"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 build-essential libncurses-dev bison flex libssl-dev libelf-dev bc
          echo "user_allow_other" | sudo tee -a /etc/fuse.conf

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ClawFS
        run: cargo build --release --bin clawfsd

      - name: Start ClawFS
        run: |
          mkdir -p /tmp/clawfs-mnt /tmp/clawfs-store /tmp/clawfs-cache

          ./target/release/clawfsd \
            --mount-path /tmp/clawfs-mnt \
            --store-path /tmp/clawfs-store \
            --local-cache-path /tmp/clawfs-cache \
            --state-path /tmp/clawfs-state.bin \
            --object-provider local \
            --log-file /tmp/clawfs-mount.log \
            --allow-other \
            --disable-journal \
            --disable-cleanup \
            --foreground &
          echo $! > /tmp/clawfs.pid

          echo "Waiting for ClawFS mount..."
          for i in $(seq 1 30); do
            if mountpoint -q /tmp/clawfs-mnt 2>/dev/null; then
              echo "ClawFS is mounted"
              break
            fi
            sleep 1
          done

          if ! mountpoint -q /tmp/clawfs-mnt 2>/dev/null; then
            echo "ClawFS failed to mount"
            exit 1
          fi

      - name: Check disk space
        run: df -h

      - name: Download and extract Linux kernel
        run: |
          cd /tmp/clawfs-mnt
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.11.tar.xz
          tar -xf linux-6.11.tar.xz
          rm linux-6.11.tar.xz

      - name: Compile kernel
        run: |
          cd /tmp/clawfs-mnt/linux-6.11

          # Configure with tinyconfig for minimal build
          make tinyconfig

          echo "Config size: $(wc -l < .config) lines"

          # Time the compilation
          echo "Starting kernel compilation with $(nproc) cores..."
          time make -j$(nproc) 2>&1 | tee /tmp/kernel-build.log

          # Check if vmlinux was created
          if [ -f vmlinux ]; then
            echo "Kernel compilation successful!"
            ls -lh vmlinux
          else
            echo "Kernel compilation failed!"
            exit 1
          fi

      - name: Upload ClawFS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clawfs-mount-log
          path: /tmp/clawfs-mount.log
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          cd /tmp
          if [ -f /tmp/clawfs.pid ]; then
            kill $(cat /tmp/clawfs.pid) || true
            sleep 2
          fi
          sudo umount -l /tmp/clawfs-mnt || fusermount -u /tmp/clawfs-mnt || true
