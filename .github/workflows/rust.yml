name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: "clippy"
      - name: Install native deps for criterion html reports
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev
      - name: Run clippy
        run: cargo clippy -- -D warnings

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install native deps for criterion html reports
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
