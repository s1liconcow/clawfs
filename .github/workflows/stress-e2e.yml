name: stress-e2e

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  stress-e2e:
    name: Run stress E2E smoke tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3
          echo "user_allow_other" | sudo tee -a /etc/fuse.conf

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ClawFS
        run: cargo build --release

      - name: Run stress E2E
        env:
          LOG_FILE: /tmp/clawfs-mount.log
        run: ./scripts/stress_e2e.sh

      - name: Run metadata consistency E2E
        env:
          LOG_FILE: /tmp/clawfs-mount.log
        run: ./scripts/metadata_consistency_e2e.sh

      - name: Upload ClawFS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clawfs-mount-log
          path: /tmp/clawfs-mount.log
          if-no-files-found: ignore
