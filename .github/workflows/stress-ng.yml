name: stress-ng

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  stress-ng:
    name: Run stress-ng on FUSE mount
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 stress-ng
          echo "user_allow_other" | sudo tee -a /etc/fuse.conf

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ClawFS
        run: cargo build --release --bin clawfsd

      - name: Start ClawFS
        run: |
          mkdir -p /tmp/clawfs-mnt /tmp/clawfs-store /tmp/clawfs-cache

          ./target/release/clawfsd \
            --mount-path /tmp/clawfs-mnt \
            --store-path /tmp/clawfs-store \
            --local-cache-path /tmp/clawfs-cache \
            --state-path /tmp/clawfs-state.bin \
            --object-provider local \
            --log-file /tmp/clawfs-mount.log \
            --allow-other \
            --disable-journal \
            --disable-cleanup \
            --foreground &
          echo $! > /tmp/clawfs.pid

          echo "Waiting for ClawFS mount..."
          for i in $(seq 1 30); do
            if mountpoint -q /tmp/clawfs-mnt 2>/dev/null; then
              echo "ClawFS is mounted"
              break
            fi
            sleep 1
          done

          if ! mountpoint -q /tmp/clawfs-mnt 2>/dev/null; then
            echo "ClawFS failed to mount"
            exit 1
          fi

      - name: Run stress-ng
        run: |
          cd /tmp/clawfs-mnt
          sudo stress-ng --access 1 --chdir 1 --chmod 1 --chown 1 \
            --dentry 1 --dir 1 --dirdeep 1 --dirmany 1 --dup 1 --eventfd 1 \
            --fd-fork 1 --filename 1 --fstat 1 \
            --getdent 1 --link 1 \
            --metamix 1 --open 1 --rename 1 --symlink 1 \
            --touch 1 --utime 1 --timeout 60s

      - name: Upload ClawFS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clawfs-mount-log
          path: /tmp/clawfs-mount.log
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          cd /tmp
          if [ -f /tmp/clawfs.pid ]; then
            kill $(cat /tmp/clawfs.pid) || true
            sleep 2
          fi
          sudo umount -l /tmp/clawfs-mnt || fusermount -u /tmp/clawfs-mnt || true
