name: preload-exercise

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  preload-exercise:
    name: Exercise preload (LD_PRELOAD) layer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ClawFS
        run: cargo build --release

      - name: Run preload exercise suite
        run: ./scripts/preload_exercise.sh
