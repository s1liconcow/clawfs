name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Artifacts
    runs-on: ubuntu-latest
    outputs:
      preload_present: ${{ steps.preload-check.outputs.present }}
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Determine release tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev

      - name: Build ClawFS binaries
        run: cargo build --release --bin clawfs --bin clawfs_checkpoint --bin clawfs_replay

      - name: Build NFS gateway
        run: cargo build --release --manifest-path clawfs-nfs-gateway/Cargo.toml

      - name: Detect preload crate
        id: preload-check
        run: |
          if [[ -f clawfs-preload/Cargo.toml ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build preload library
        if: steps.preload-check.outputs.present == 'true'
        run: cargo build --release --manifest-path clawfs-preload/Cargo.toml

      - name: Package release artifacts
        run: |
          set -euo pipefail
          TAG="${{ steps.get-tag.outputs.tag }}"
          DIST="dist/linux"
          mkdir -p "$DIST"

          cp target/release/clawfs "$DIST/"
          cp target/release/clawfs_checkpoint "$DIST/"
          cp target/release/clawfs_replay "$DIST/"
          cp target/release/clawfs-nfs-gateway "$DIST/"

          if [[ -f clawfs-preload/target/release/libclawfs_preload.so ]]; then
            cp clawfs-preload/target/release/libclawfs_preload.so "$DIST/"
          fi

          cp README.md "$DIST/"

          tar -C dist/linux -czf "dist/clawfs-${TAG}-linux-x86_64.tar.gz" .

      - name: Upload packaged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawfs-release-linux
          path: dist/clawfs-*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten downloaded artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.get-tag.outputs.tag }}"
          gh release create "$TAG" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
