name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Artifacts
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Determine release tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev libfuse3-dev

      - name: Build ClawFS binaries
        run: cargo build --release --bin clawfs --bin clawfsd --bin clawfs_checkpoint --bin clawfs_replay

      - name: Package release artifacts
        run: |
          set -euo pipefail
          TAG="${{ steps.get-tag.outputs.tag }}"
          DIST="dist/linux"
          mkdir -p "$DIST"

          cp target/release/clawfs "$DIST/"
          cp target/release/clawfsd "$DIST/"
          cp target/release/clawfs_checkpoint "$DIST/"
          cp target/release/clawfs_replay "$DIST/"

          cp README.md "$DIST/"

          tar -C dist/linux -czf "dist/clawfs-${TAG}-linux-x86_64.tar.gz" .

      - name: Upload packaged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawfs-release-linux
          path: dist/clawfs-*.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows Artifacts
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Determine release tag
        id: get-tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build ClawFS CLI (NFS-only, no FUSE)
        run: cargo build --release -p clawfs --no-default-features --bin clawfs

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.get-tag.outputs.tag }}"
          DIST="dist/windows"
          mkdir -p "$DIST"

          cp target/release/clawfs.exe "$DIST/"
          cp README.md "$DIST/"

          cd dist/windows
          7z a -tzip "../clawfs-${TAG}-windows-x86_64.zip" .

      - name: Upload packaged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawfs-release-windows
          path: dist/clawfs-*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten downloaded artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.get-tag.outputs.tag }}"
          gh release create "$TAG" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes

  trigger-private-release:
    name: Trigger Private Release
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Determine release tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch private release workflow
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_RELEASE_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            repos/recurvelabs/clawfs_private/dispatches \
            -f event_type=public_release \
            -f client_payload[tag]="${{ steps.get-tag.outputs.tag }}" \
            -f client_payload[public_sha]="${{ github.sha }}"
