name: Website and Perf Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages content
        id: prepare
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/pages-site"
          site_src="website/osagefs.org"
          perf_out_dir="$out_dir/perf"

          if [[ ! -d "$site_src" ]]; then
            echo "missing website source directory: $site_src" >&2
            exit 1
          fi

          mkdir -p "$out_dir"
          cp -a "$site_src/." "$out_dir/"

          mkdir -p "$perf_out_dir"
          if [[ -d "bench-artifacts/perf_guard_graphs" ]]; then
            cp -a "bench-artifacts/perf_guard_graphs/." "$perf_out_dir/"
          fi

          touch "$out_dir/.nojekyll"

          {
            echo "<!doctype html>"
            echo "<html><head><meta charset=\"utf-8\"><title>OsageFS Perf Reports</title></head><body>"
            echo "<h1>OsageFS Perf Reports</h1>"
            echo "<p><a href=\"../\">Back to osagefs.org</a></p>"
            echo "<p>Run folders are date-prefixed for lexical ordering.</p>"
            echo "<ul>"
            find "$perf_out_dir" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -r | while read -r run; do
              if [[ -f "$perf_out_dir/$run/report/index.html" ]]; then
                echo "<li><a href=\"$run/report/index.html\">$run</a></li>"
              else
                echo "<li>$run (no report/index.html)</li>"
              fi
            done
            echo "</ul>"
            echo "</body></html>"
          } > "$perf_out_dir/index.html"

          echo "site_dir=$out_dir" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.prepare.outputs.site_dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
